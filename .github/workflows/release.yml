name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      - name: Build MCPB bundle
        run: ./scripts/build-mcpb.sh "${{ github.ref_name }}"
      - name: Upload MCPB to release
        run: gh release upload "${{ github.ref_name }}" dist/mcp-server-email-${{ github.ref_name }}.mcpb --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # MCP Registry publish — uncomment when modelcontextprotocol/publish-action is available
      # - name: Publish to MCP Registry
      #   if: vars.PUBLISH_TO_MCP_REGISTRY == 'true'
      #   uses: modelcontextprotocol/publish-action@v1
      #   with:
      #     server-json: server.json
